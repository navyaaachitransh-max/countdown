<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAIROS</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="scanlines"></div>
<div class="overlay">

  <div class="rec">🔴 REC</div>
  <div id="clock" class="clock"></div>

  <h1 class="stay-tuned">
    Stay Tuned 🎵
  </h1>

  <p class="counting">
    counting down
  </p>

  <div class="countdown">

    <div class="box">
      <span id="days">00</span>
      <small>DAYS</small>
    </div>

    <div class="colon">:</div>

    <div class="box">
      <span id="hours">00</span>
      <small>HRS</small>
    </div>

    <div class="colon">:</div>

    <div class="box">
      <span id="minutes">00</span>
      <small>MIN</small>
    </div>

    <div class="colon">:</div>

    <div class="box">
      <span id="seconds">00</span>
      <small>SEC</small>
    </div>

  </div>

  <h2>KAIROS</h2>

  <p class="tagline">
    Pulse of Passion, Rhythm of Talent
  </p>

  <div class="info">

    <div>
      <label>DATE</label>
      <h3>10.06</h3>
    </div>

    <div>
      <label>TIME</label>
      <h3>16:30</h3>
    </div>

    <div>
      <label>SPOT</label>
      <h3>B/W LH1 AND LH2</h3>
    </div>

    <div>
      <label>WEAR</label>
      <h3 class="blue">BLUE</h3>
    </div>

  </div>

</div>

<script src="./script.js"></script>

</body>
</html>
